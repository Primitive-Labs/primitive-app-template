#
# js-bao model definitions for the template app.
#
# This file is loaded at runtime by `src/models/index.ts` via
# `loadSchemaFromTomlString` from js-bao. Schemas are CLIENT-ONLY — they are
# never registered with the Primitive server, so renaming or evolving fields is
# a normal client-side code change with no schema-migration step.
#
# Add a new `[models.<name>]` section below to declare a new model. Use TOML
# snake_case (`auto_assign`, `max_length`, `max_count`, `related_id_field`);
# the loader maps it to camelCase at runtime.
#
# Field types: id | string | number | boolean | date | stringset
# Field options: indexed, unique, required, auto_assign, max_length, max_count, default
#

[models.user_prefs.fields.id]
type = "id"
auto_assign = true
indexed = true

[models.user_prefs.fields.key]
type = "string"
indexed = true
unique = true

[models.user_prefs.fields.value]
type = "string"
